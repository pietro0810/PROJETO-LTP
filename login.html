    <h2>Login</h2>

    <p>Entre na sua conta para continuar sua experiência na loja.</p>

    <form>

        <label>Nome:</label><br>
        <input type="text" name="text" placeholder="Digite seu nome aqui"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"  placeholder="Digite seu E-mail aqui" required><br><br>

        <label>Senha:</label><br>
        <input type="password" name="password" placeholder="Digite sua senha aqui" required><br><br>

        <label>Telefone:</label><br>
        <input type="tel" name="tel" placeholder="Digite seu telefone" required><br><br>

        <label>Endereço:</label><br>
        <input type="text" placeholder="Digite seu endereço" required><br><br>

        <label>Descrição:</label><br>
        <textarea name="description" placeholder="Digite uma breve descrição sobre você" required></textarea><br><br>


        <a href="index.html">
            <button type="button">Entrar</button>
        </a>
    </form>
